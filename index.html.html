<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic',sans-serif;background:linear-gradient(135deg,#fce4ec,#f3e5f5,#ede7f6);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
.container{background:#fff;border-radius:24px;padding:32px;max-width:800px;width:100%;box-shadow:0 8px 32px rgba(156,39,176,.12);margin:20px auto}
.screen{display:none}.screen.active{display:block}
h1{font-size:2rem;color:#7b1fa2;margin-bottom:12px;text-align:center}
h2{font-size:1.4rem;color:#7b1fa2;margin-bottom:16px;text-align:center}
.subtitle{text-align:center;color:#555;font-size:1.05rem;margin-bottom:8px}
.icon-big{font-size:3.5rem;text-align:center;margin-bottom:16px}
.btn{background:linear-gradient(135deg,#8e24aa,#ab47bc);color:#fff;border:none;padding:15px 36px;font-size:1.15rem;border-radius:50px;cursor:pointer;transition:all .3s;font-weight:700;margin-top:16px;display:inline-block}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(142,36,170,.4)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.score-bar{text-align:center;background:linear-gradient(90deg,#fce4ec,#f3e5f5);padding:12px 20px;border-radius:30px;margin-bottom:20px;font-weight:700;color:#7b1fa2;font-size:1.15rem}
.prog{font-size:1rem;color:#7b1fa2;font-weight:700;text-align:center;margin-bottom:8px}
.pbar-bg{width:100%;height:10px;background:#f3e5f5;border-radius:5px;margin-bottom:20px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,#8e24aa,#ce93d8);border-radius:5px;transition:width .4s}
.q-title{font-size:1.25rem;color:#333;font-weight:700;margin-bottom:16px;text-align:center;line-height:1.5}
.phase-label{text-align:center;font-size:.9rem;color:#fff;background:#8e24aa;display:inline-block;padding:4px 16px;border-radius:20px;margin-bottom:12px}
.choices-grid{display:grid;gap:14px;margin-bottom:16px}
.choices-grid.col2{grid-template-columns:repeat(2,1fr)}
.choices-grid.col3{grid-template-columns:repeat(3,1fr)}
.choices-grid.col4{grid-template-columns:repeat(2,1fr)}
.choices-grid.col5{grid-template-columns:repeat(3,1fr)}
.choice-card{border:3px solid #e0e0e0;border-radius:16px;padding:12px;text-align:center;cursor:pointer;transition:all .25s;background:#fafafa}
.choice-card:hover{border-color:#ce93d8;transform:translateY(-3px);box-shadow:0 4px 12px rgba(156,39,176,.15)}
.choice-card img{width:100%;height:100px;object-fit:cover;border-radius:10px;margin-bottom:8px}
.choice-card span{font-size:1rem;font-weight:600;color:#333;display:block}
.choice-card.selected{border-color:#8e24aa;background:#f3e5f5;pointer-events:none}
.choice-card.disabled{pointer-events:none;opacity:.6}
.predict-box{margin:16px 0;padding:20px;background:#fff8e1;border-radius:16px;border:2px solid #ffcc80;text-align:center}
.predict-box h3{color:#e65100;margin-bottom:12px}
.predict-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px}
.predict-chip{padding:10px 18px;border-radius:30px;border:2px solid #e0e0e0;cursor:pointer;font-weight:600;transition:all .2s;background:#fff}
.predict-chip:hover{border-color:#ff9800}
.predict-chip.selected{background:#fff3e0;border-color:#ff9800;color:#e65100}
.pct-input{width:80px;padding:10px;font-size:1.2rem;border:2px solid #ce93d8;border-radius:12px;text-align:center;margin:0 8px}
.result-box{margin:16px 0;padding:20px;background:#f9fbe7;border-radius:16px;border:1px solid #dce775}
.result-box h3{color:#33691e;margin-bottom:12px}
.chart-box{max-width:300px;margin:12px auto}
.strip-chart{width:100%;height:40px;border-radius:10px;overflow:hidden;display:flex;margin:12px 0}
.strip-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff}
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.95rem}
th{background:#f3e5f5;color:#7b1fa2;padding:10px}
td{padding:10px;text-align:center;border-bottom:1px solid #eee}
.winner-badge{color:#e65100;font-weight:700}
.img-sm{width:36px;height:36px;object-fit:cover;border-radius:8px;vertical-align:middle;margin-right:6px}
.score-gain{text-align:center;font-size:1.3rem;font-weight:700;margin:12px 0;padding:12px;border-radius:12px}
.score-gain.good{background:#e8f5e9;color:#2e7d32}
.score-gain.bad{background:#ffebee;color:#c62828}
.timer-box{text-align:center;margin:16px 0}
.timer-ring{display:inline-block;width:80px;height:80px;border-radius:50%;border:6px solid #f3e5f5;position:relative;margin-bottom:8px}
.timer-ring.urgent{border-color:#ffcdd2;animation:pulse .5s infinite alternate}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:900;color:#7b1fa2}
.timer-ring.urgent .timer-num{color:#e53935}
.timer-label{font-size:.9rem;color:#888}
.live-count{text-align:center;background:#e8f5e9;padding:8px 16px;border-radius:20px;display:inline-block;font-weight:600;color:#2e7d32;margin:8px 0;font-size:.95rem}
.role-select{display:flex;gap:16px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.role-btn{padding:20px 32px;border-radius:16px;border:3px solid #e0e0e0;cursor:pointer;text-align:center;transition:all .3s;background:#fafafa;min-width:140px}
.role-btn:hover{border-color:#8e24aa;transform:translateY(-3px);box-shadow:0 4px 16px rgba(142,36,170,.2)}
.role-btn .emoji{font-size:2.5rem;display:block;margin-bottom:8px}
.role-btn .label{font-size:1.1rem;font-weight:700;color:#333}
.room-input{padding:12px 20px;font-size:1.1rem;border:2px solid #ce93d8;border-radius:12px;text-align:center;width:200px;margin:8px}
.waiting-msg{text-align:center;padding:30px;color:#7b1fa2;font-size:1.2rem;font-weight:600}
.waiting-msg .dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.05)}}
@media(max-width:600px){.container{padding:20px}h1{font-size:1.5rem}.choices-grid.col2,.choices-grid.col3,.choices-grid.col4,.choices-grid.col5{grid-template-columns:repeat(2,1fr)}.choice-card img{height:70px}}
</style>
</head>
<body>
<div class="container">
<!-- 시작 화면 -->
<div class="screen active" id="startScreen"><div style="text-align:center;padding:40px 20px">
<div class="icon-big">🗳️📊🎮</div>
<h1>실시간 투표 & 예측 게임</h1>
<p class="subtitle">6학년 수학 - 원그래프와 띠그래프</p>
<p class="subtitle">모두 동시에 투표! 20초 안에 선택하세요</p>

<!-- 대기 화면 -->
<div class="screen" id="waitScreen">
<div class="waiting-msg">
<div class="icon-big">⏳</div>
<p>선생님이 게임을 시작할 때까지 기다려주세요<span class="dots"></span></p>
<p style="margin-top:12px;font-size:1rem;color:#888" id="waitRoomInfo"></p>

<!-- 교사 대기 화면 -->
<div class="screen" id="teacherWaitScreen">
<div style="text-align:center;padding:20px">
<div class="icon-big">👩‍🏫</div>
<h2>학생 접속 대기 중</h2>
<p style="color:#555;margin-bottom:12px" id="teacherRoomInfo"></p>
<p class="live-count" id="teacherCount">접속: 0명</p>
<p style="color:#888;margin:16px 0;font-size:.95rem">학생들이 같은 방 코드로 접속하면 숫자가 올라갑니다</p>
<button class="btn" id="teacherStartBtn" onclick="teacherStart()">🚀 게임 시작!</button>
</div>
</div>

<!-- 게임 화면 -->
<div class="screen" id="gameScreen">
<div class="score-bar" id="scoreBar">⭐ 점수: 0점</div>
<div class="prog" id="prog">1 / 10</div>
<div class="pbar-bg"><div class="pbar" id="pBar"></div></div>
<div id="phaseContent"></div>
</div>

<!-- 최종 화면 -->
<div class="screen" id="finalScreen">
<div class="icon-big">🏆</div>
<h2>게임 완료!</h2>
<div class="score-bar" id="finalScore"></div>
<div id="finalContent"></div>
<div style="text-align:center;margin-top:20px">
<button class="btn" style="background:linear-gradient(135deg,#43a047,#66bb6a)" onclick="location.reload()">🔄 다시하기</button>
<button class="btn" style="background:linear-gradient(135deg,#e53935,#ef5350)" onclick="resetData()" id="resetBtn">🗑️ 초기화 (교사용)</button>
</div>
</div>
</div>

]},
{q:"🎬 좋아하는 영화 장르?",type:4,options:[

{text:"코미디",img:"https://cdn.pixabay.com/photo/2017/07/31/11/21/people-2557396_640.jpg"},

]},
{q:"🎉 생일파티에서 하고 싶은 건?",type:5,options:[

{text:"노래방",img:"https://cdn.pixabay.com/photo/2016/11/19/09/57/guitar-1838390_640.jpg"},
{text:"영화보기",img:"https://cdn.pixabay.com/photo/2017/11/24/10/43/ticket-2974645_640.jpg"},
{text:"잠자기",img:"https://cdn.pixabay.com/photo/2017/01/25/17/40/sleeping-2008557_640.jpg"},
{text:"폰게임",img:"https://cdn.pixabay.com/photo/2019/06/10/17/03/mobile-phone-4265058_640.jpg"}
]}
];

var COLORS=['#e91e63','#9c27b0','#2196f3','#4caf50','#ff9800','#00bcd4','#795548'];
var VOTE_TIME = 20; // 투표 시간 20초

var role = ''; // 'teacher' or 'student'
var roomCode = '';
var myId = 'user_' + Math.random().toString(36).substr(2,9);
var cur = 0, score = 0, phase = 'vote';
var myVote = -1, myPredictChoice = -1, myPredictPct = 0;
var timerInterval = null;
var timeLeft = VOTE_TIME;
var voted = false;

function show(id){
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
    document.getElementById(id).classList.add('active');
}

function updScore(){
    document.getElementById('scoreBar').textContent='⭐ 점수: '+score+'점';
}

function getPoints(type){return type===2?10:type===3?15:type===4?20:25}

// 방 참여
function joinAs(r){
    roomCode = document.getElementById('roomInput').value.trim().toLowerCase();
    if(!roomCode){alert('방 코드를 입력해주세요!');return;}
    role = r;

    // 접속 등록
    var presRef = db.ref('rooms/'+roomCode+'/presence/'+myId);
    presRef.set({role:role, joinedAt:Date.now()});
    presRef.onDisconnect().remove();

    if(role==='teacher'){
        show('teacherWaitScreen');
        document.getElementById('teacherRoomInfo').textContent='방 코드: '+roomCode;
        listenPresence('teacherCount');
    } else {
        show('waitScreen');
        document.getElementById('waitRoomInfo').textContent='방 코드: '+roomCode;
        listenPresence('waitCount');
        listenGameState();
    }
}

// 접속 인원 리스닝
function listenPresence(elId){
    db.ref('rooms/'+roomCode+'/presence').on('value',function(snap){
        var count = snap.numChildren();
        var el = document.getElementById(elId);
        if(el) el.textContent = '👥 접속: '+count+'명';
    });
}

// 교사: 게임 시작
function teacherStart(){
    db.ref('rooms/'+roomCode+'/state').set({
        phase:'vote', cur:0, startedAt:Date.now()
    });
    show('gameScreen');
    cur=0; phase='vote'; score=0; updScore();
    renderPhase();
    listenVotesRealtime();
}

// 학생: 게임 상태 리스닝
function listenGameState(){
    db.ref('rooms/'+roomCode+'/state').on('value',function(snap){
        var state = snap.val();
        if(!state) return;

        cur = state.cur || 0;
        phase = state.phase || 'vote';

        if(phase==='vote'){
            voted = false; myVote=-1; myPredictChoice=-1; myPredictPct=0;
            show('gameScreen');
            updScore();
            renderPhase();
        } else if(phase==='predict'){
            show('gameScreen');
            renderPhase();
        } else if(phase==='result'){
            show('gameScreen');
            renderPhase();
        } else if(phase==='final'){
            showFinal();
        }
    });
}

// 실시간 투표 수 리스닝
function listenVotesRealtime(){
    db.ref('rooms/'+roomCode+'/votes/q'+cur).on('value',function(snap){
        var data = snap.val();
        if(!data) return;
        var count = Object.keys(data).length;
        var el = document.getElementById('liveVoteCount');
        if(el) el.textContent = '🗳️ 현재 투표: '+count+'명';
    });
}

// 타이머 시작
function startTimer(){
    clearInterval(timerInterval);
    timeLeft = VOTE_TIME;
    updateTimerDisplay();
    timerInterval = setInterval(function(){
        timeLeft--;
        updateTimerDisplay();
        if(timeLeft <= 0){
            clearInterval(timerInterval);
            onTimeUp();
        }
    },1000);
}

function updateTimerDisplay(){
    var numEl = document.getElementById('timerNum');
    var ringEl = document.getElementById('timerRing');
    if(!numEl||!ringEl) return;
    numEl.textContent = timeLeft;
    if(timeLeft<=5){
        ringEl.classList.add('urgent');
    } else {
        ringEl.classList.remove('urgent');
    }
}

function onTimeUp(){
    // 시간 초과 - 투표 안 했으면 투표 불가
    if(!voted){
        var cards = document.querySelectorAll('.choice-card');
        cards.forEach(function(c){c.classList.add('disabled')});
    }
    // 교사면 자동으로 예측 단계로
    if(role==='teacher'){
        setTimeout(function(){
            goToPredict();
        },1500);
    }
}

function goToPredict(){
    phase='predict';
    db.ref('rooms/'+roomCode+'/state').update({phase:'predict'});
    renderPhase();
}

// 렌더링
function renderPhase(){
    var q=questions[cur];
    document.getElementById('prog').textContent=(cur+1)+' / 10';
    document.getElementById('pBar').style.width=(cur/10*100)+'%';
    updScore();
    var box=document.getElementById('phaseContent');

    if(phase==='vote'){
        var html='<div style="text-align:center"><span class="phase-label">🗳️ 투표</span></div>';
        html+='<div class="timer-box"><div class="timer-ring" id="timerRing"><span class="timer-num" id="timerNum">'+VOTE_TIME+'</span></div><p class="timer-label">남은 시간</p></div>';
        html+='<div class="q-title">'+q.q+'</div>';
        html+='<p class="live-count" id="liveVoteCount">🗳️ 현재 투표: 0명</p>';
        html+='<div class="choices-grid col'+q.type+'" id="voteGrid">';
        for(var i=0;i<q.options.length;i++){
            var dis = voted ? ' disabled' : '';
            var sel = (voted && myVote===i) ? ' selected' : '';
            html+='<div class="choice-card'+dis+sel+'" data-idx="'+i+'" onclick="doVote('+i+')"><img src="'+q.options[i].img+'" onerror="this.src=\'https://cdn.pixabay.com/photo/2016/09/04/13/08/green-1643916_640.jpg\'"><span>'+q.options[i].text+'</span></div>';
        }
        html+='</div>';
        if(voted) html+='<p style="text-align:center;color:#43a047;font-weight:700;margin-top:8px">✅ 투표 완료! 다른 친구들을 기다려요</p>';
        box.innerHTML=html;
        if(!voted) startTimer();
        // 실시간 카운트 리스닝
        db.ref('rooms/'+roomCode+'/votes/q'+cur).on('value',function(snap){
            var data=snap.val();
            var count=data?Object.keys(data).length:0;
            var el=document.getElementById('liveVoteCount');
            if(el) el.textContent='🗳️ 현재 투표: '+count+'명';
        });
    } else if(phase==='predict'){
        clearInterval(timerInterval);
        var pts=getPoints(q.type);
        var html='<div style="text-align:center"><span class="phase-label" style="background:#ff9800">🔮 예측</span></div>';
        html+='<div class="q-title">'+q.q+'</div>';
        html+='<div class="predict-box"><h3>우리 반에서 1등은 뭘까? <span style="font-size:.85rem;color:#888">(맞추면 +'+pts+'점)</span></h3>';
        html+='<div class="predict-chips" id="predChips">';
        for(var i=0;i<q.options.length;i++){
            html+='<span class="predict-chip" data-idx="'+i+'" onclick="pickPred(this,'+i+')">'+q.options[i].text+'</span>';
        }
        html+='</div>';
        html+='<p style="margin-top:12px">1등의 비율은 몇 %? <input type="number" class="pct-input" id="pctInput" min="1" max="100" placeholder="%"> %</p>';
        html+='<button class="btn" onclick="submitPred()">예측 완료! 📊</button>';
        html+='</div>';
        box.innerHTML=html;
    } else if(phase==='result'){
        clearInterval(timerInterval);
        showQuestionResult(box);
    }
}

// 투표 처리 (Firebase에 저장)
function doVote(idx){
    if(voted) return;
    voted = true;
    myVote = idx;
    db.ref('rooms/'+roomCode+'/votes/q'+cur+'/'+myId).set(idx);
    // 선택 표시
    var cards = document.querySelectorAll('.choice-card');
    cards.forEach(function(c){c.classList.add('disabled')});
    cards[idx].classList.remove('disabled');
    cards[idx].classList.add('selected');
    var msg = document.createElement('p');
    msg.style.cssText='text-align:center;color:#43a047;font-weight:700;margin-top:8px';
    msg.textContent='✅ 투표 완료! 다른 친구들을 기다려요';
    document.getElementById('voteGrid').parentNode.appendChild(msg);
}

function pickPred(el,idx){
    document.querySelectorAll('#predChips .predict-chip').forEach(function(c){c.classList.remove('selected')});
    el.classList.add('selected');
    myPredictChoice=idx;
}

function submitPred(){
    if(myPredictChoice<0){alert('1등을 예측해주세요!');return}
    myPredictPct=parseInt(document.getElementById('pctInput').value)||0;
    if(myPredictPct<1||myPredictPct>100){alert('1~100 사이의 비율을 입력해주세요!');return}
    // 교사면 결과 보여주기
    if(role==='teacher'){
        phase='result';
        db.ref('rooms/'+roomCode+'/state').update({phase:'result'});
        renderPhase();
    } else {
        // 학생은 결과 대기 (state 리스너가 처리)
        var box=document.getElementById('phaseContent');
        box.innerHTML='<div class="waiting-msg"><p>예측 완료! 결과를 기다려요<span class="dots"></span></p></div>';
    }
}

// 결과 화면
function showQuestionResult(box){
    var q=questions[cur];
    // Firebase에서 투표 데이터 가져오기
    db.ref('rooms/'+roomCode+'/votes/q'+cur).once('value',function(snap){
        var data = snap.val() || {};
        var votes = Object.values(data);
        var counts = new Array(q.options.length).fill(0);
        for(var i=0;i<votes.length;i++) counts[votes[i]]++;
        var total = votes.length;
        var maxIdx=0;
        for(var j=1;j<counts.length;j++){if(counts[j]>counts[maxIdx])maxIdx=j}
        var pcts=counts.map(function(c){return total>0?Math.round(c/total*100):0});

        // 점수 계산
        var pts=getPoints(q.type);
        var gained=0;
        if(myPredictChoice===maxIdx) gained+=pts;
        if(myPredictPct>0){
            var diff=Math.abs(myPredictPct-pcts[maxIdx]);
            if(diff===0)gained+=30;
            else if(diff<=5)gained+=20;
            else if(diff<=10)gained+=10;
        }
        score+=gained;
        updScore();

        var html='<div style="text-align:center"><span class="phase-label" style="background:#43a047">📊 결과</span></div>';
        html+='<div class="q-title">'+q.q+'</div>';

        if(gained>0) html+='<div class="score-gain good">🎉 +'+gained+'점 획득!</div>';
        else html+='<div class="score-gain bad">😢 이번엔 아쉬워요! +0점</div>';

        // 예측 비교
        if(myPredictChoice>=0){
            var myPickText=q.options[myPredictChoice].text;
            var correct=myPredictChoice===maxIdx;
            html+='<div style="background:'+(correct?'#e8f5e9':'#ffebee')+';padding:12px;border-radius:12px;margin:12px 0;text-align:center">';
            html+='내 예측: <strong>'+myPickText+'</strong>('+myPredictPct+'%) '+(correct?'✅ 맞았어!':'❌ 정답: '+q.options[maxIdx].text)+'  |  실제 1등 비율: <strong>'+pcts[maxIdx]+'%</strong></div>';
        }

        // 띠그래프
        html+='<p style="font-size:.95rem;color:#555;margin:12px 0 4px"><strong>📊 띠그래프</strong></p>';
        html+='<div class="strip-chart">';
        for(var j=0;j<q.options.length;j++){
            if(pcts[j]>0)html+='<div class="strip-seg" style="width:'+Math.max(pcts[j],8)+'%;background:'+COLORS[j%COLORS.length]+'">'+pcts[j]+'%</div>';
        }
        html+='</div>';
        html+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0">';
        for(var j=0;j<q.options.length;j++){
            html+='<span style="font-size:.85rem"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:'+COLORS[j%COLORS.length]+';margin-right:4px"></span>'+q.options[j].text+'</span>';
        }
        html+='</div>';

        // 원그래프
        html+='<p style="font-size:.95rem;color:#555;margin:12px 0 4px"><strong>🥧 원그래프</strong></p>';
        html+='<div class="chart-box"><canvas id="pieChart"></canvas></div>';

        // 표
        html+='<table><tr><th>항목</th><th>투표 수</th><th>비율</th></tr>';
        for(var j=0;j<q.options.length;j++){
            var badge=j===maxIdx?'<span class="winner-badge">🔥1등</span> ':'';
            html+='<tr><td><img class="img-sm" src="'+q.options[j].img+'" onerror="this.style.display=\'none\'">'+badge+q.options[j].text+'</td><td>'+counts[j]+'명</td><td>'+pcts[j]+'%</td></tr>';
        }
        html+='</table>';
        html+='<p style="text-align:center;color:#888;font-size:.85rem">총 '+total+'명 투표</p>';

        // 다음 버튼 (교사만)
        if(role==='teacher'){
            if(cur<9) html+='<div style="text-align:center"><button class="btn" onclick="nextQ()">다음 문제 ➡️</button></div>';
            else html+='<div style="text-align:center"><button class="btn" onclick="goFinal()">최종 결과 보기 🏆</button></div>';
        } else {
            if(cur<9) html+='<p style="text-align:center;color:#888;margin-top:16px">선생님이 다음 문제로 넘기면 자동으로 이동합니다</p>';
            else html+='<p style="text-align:center;color:#888;margin-top:16px">잠시만 기다려주세요...</p>';
        }

        box.innerHTML=html;

        // 원그래프 그리기
        setTimeout(function(){
            var ctx=document.getElementById('pieChart');
            if(ctx){new Chart(ctx,{type:'pie',data:{labels:q.options.map(function(o){return o.text}),datasets:[{data:counts,backgroundColor:COLORS.slice(0,q.options.length)}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:12}}}}}})}
        },100);
    });
}

function nextQ(){
    cur++;
    myVote=-1; myPredictChoice=-1; myPredictPct=0; phase='vote'; voted=false;
    db.ref('rooms/'+roomCode+'/state').set({phase:'vote',cur:cur,startedAt:Date.now()});
    renderPhase();
    listenVotesRealtime();
}

function goFinal(){
    db.ref('rooms/'+roomCode+'/state').update({phase:'final'});
    showFinal();
}

function showFinal(){
    show('finalScreen');
    document.getElementById('finalScore').textContent='🏆 최종 점수: '+score+'점 / 250점';
    var grade='';
    if(score>=200)grade='🥇 그래프 천재!';
    else if(score>=150)grade='🥈 예측의 달인!';
    else if(score>=100)grade='🥉 그래프 탐험가!';
    else if(score>=50)grade='🌱 성장하는 통계가!';
    else grade='💪 다음엔 더 잘할 수 있어!';
    document.getElementById('finalContent').innerHTML='<div style="text-align:center;font-size:1.5rem;font-weight:700;color:#7b1fa2;margin:20px 0">'+grade+'</div><p style="text-align:center;color:#555">원그래프와 띠그래프를 잘 이해했나요?<br>비율(%)로 비교하면 전체에서 각 부분이 얼마인지 알 수 있어요!</p>';
    confetti({particleCount:150,spread:80,origin:{y:.6}});
}

function resetData(){
    var pw=prompt('교사 비밀번호를 입력하세요 (기본: 1234):');
    if(pw==='1234'){
        if(confirm('이 방의 모든 데이터를 초기화할까요?')){
            db.ref('rooms/'+roomCode).remove();
            alert('초기화 완료!');
            location.reload();
        }
    } else if(pw!==null){
        alert('비밀번호가 틀렸습니다.');
    }
}
</script>
